<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PocketPaw</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0f;
      color: #e0e0e8;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    .splash {
      text-align: center;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: 88px;
      height: 88px;
      margin-bottom: 28px;
      filter: drop-shadow(0 0 24px rgba(139, 92, 246, 0.35));
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 24px rgba(139, 92, 246, 0.35)); }
      50% { transform: scale(1.06); filter: drop-shadow(0 0 32px rgba(139, 92, 246, 0.55)); }
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #c4b5fd, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #status {
      font-size: 13px;
      color: #6b6b80;
      margin-bottom: 24px;
      transition: color 0.3s;
    }

    .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 2.5px solid rgba(139, 92, 246, 0.15);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #retry-btn {
      display: none;
      -webkit-app-region: no-drag;
      padding: 8px 20px;
      border: 1px solid rgba(139, 92, 246, 0.4);
      background: rgba(139, 92, 246, 0.1);
      color: #c4b5fd;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    #retry-btn:hover {
      background: rgba(139, 92, 246, 0.2);
      border-color: #8b5cf6;
    }
  </style>
</head>
<body>
  <div class="splash">
    <img class="logo" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='72' x='18' font-size='72'%3E🐾%3C/text%3E%3C/svg%3E" alt="PocketPaw" />
    <h1>PocketPaw</h1>
    <div class="spinner"></div>
    <p id="status">Connecting to dashboard server…</p>
    <button id="retry-btn" onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
