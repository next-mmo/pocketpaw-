<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PocketPaw Counter</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
      iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }
      /* Loading state before Gradio is ready */
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        color: rgba(255,255,255,0.4);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        letter-spacing: 0.05em;
      }
      .loading .spinner {
        width: 20px; height: 20px;
        border: 2px solid rgba(255,255,255,0.1);
        border-top-color: #007aff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-right: 12px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="loading" class="loading">
      <div class="spinner"></div>
      Starting Counter server…
    </div>
    <iframe id="gradio-frame" style="display:none"></iframe>

    <script>
      /**
       * This page is served by PocketPaw inside an iframe.
       * Once the plugin daemon is running, PocketPaw proxies to it at:
       *   /api/v1/plugins/counter/proxy/
       *
       * We embed the Gradio UI (served by the daemon) in a nested iframe
       * pointed at the proxy URL.
       */
      (function () {
        // Derive the proxy base from the current page's URL
        // Current page is at: /api/v1/extensions/counter/static/index.html
        // Proxy is at: /api/v1/plugins/counter/proxy/
        const origin = window.location.origin;
        const proxyUrl = `${origin}/api/v1/plugins/counter/proxy/`;

        const frame = document.getElementById("gradio-frame");
        const loading = document.getElementById("loading");

        // Poll until the Gradio server is reachable
        let attempts = 0;
        const maxAttempts = 60; // 30 seconds

        function tryConnect() {
          fetch(proxyUrl, { method: "HEAD", mode: "no-cors" })
            .then(() => {
              // Server is reachable — show the iframe
              loading.style.display = "none";
              frame.style.display = "block";
              frame.src = proxyUrl;
            })
            .catch(() => {
              attempts++;
              if (attempts < maxAttempts) {
                setTimeout(tryConnect, 500);
              } else {
                loading.innerHTML =
                  '<span style="color:#ff3b30">⚠ Counter server did not start. Check plugin logs.</span>';
              }
            });
        }

        tryConnect();
      })();
    </script>
  </body>
</html>
