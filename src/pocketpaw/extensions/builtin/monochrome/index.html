<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monochrome Music — PocketPaw</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        width: 100%;
        background: #0e0e12;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
      }

      /* ── Loading splash ── */
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 20px;
        z-index: 100;
        background: #0e0e12;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }

      #splash.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Logo / icon */
      .splash-icon {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4),
          0 0 0 1px rgba(255, 255, 255, 0.06);
        animation: float 3s ease-in-out infinite;
      }

      .splash-icon svg {
        width: 36px;
        height: 36px;
        color: #e0e0e0;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }

      .splash-title {
        font-size: 20px;
        font-weight: 600;
        color: #e0e0e0;
        letter-spacing: -0.02em;
      }

      .splash-subtitle {
        font-size: 13px;
        color: #666;
        margin-top: -10px;
      }

      /* Progress bar */
      .progress-track {
        width: 200px;
        height: 3px;
        background: #1a1a1f;
        border-radius: 2px;
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #555, #aaa);
        border-radius: 2px;
        animation: load 2.5s ease-in-out forwards;
      }

      @keyframes load {
        0% {
          width: 0%;
        }
        30% {
          width: 40%;
        }
        60% {
          width: 65%;
        }
        80% {
          width: 85%;
        }
        100% {
          width: 100%;
        }
      }

      /* ── Iframe ── */
      #app-frame {
        width: 100%;
        height: 100%;
        border: none;
        background: #0e0e12;
        opacity: 0;
        transition: opacity 0.4s ease;
      }

      #app-frame.loaded {
        opacity: 1;
      }

      /* ── Error overlay ── */
      #error-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        z-index: 200;
        background: #0e0e12;
      }

      #error-overlay.visible {
        display: flex;
      }

      .error-icon {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: rgba(239, 68, 68, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .error-icon svg {
        width: 28px;
        height: 28px;
        color: #ef4444;
      }

      .error-title {
        font-size: 16px;
        font-weight: 600;
        color: #e0e0e0;
      }

      .error-desc {
        font-size: 13px;
        color: #666;
        text-align: center;
        max-width: 320px;
        line-height: 1.5;
      }

      .retry-btn {
        margin-top: 4px;
        padding: 8px 20px;
        border: 1px solid #333;
        border-radius: 8px;
        background: #1a1a1f;
        color: #e0e0e0;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
      }

      .retry-btn:hover {
        background: #222;
        border-color: #444;
      }

      .open-external {
        font-size: 12px;
        color: #555;
        text-decoration: none;
        transition: color 0.2s;
      }

      .open-external:hover {
        color: #888;
      }
    </style>
  </head>
  <body>
    <!-- Loading splash -->
    <div id="splash">
      <div class="splash-icon">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M9 18V5l12-2v13" />
          <circle cx="6" cy="18" r="3" />
          <circle cx="18" cy="16" r="3" />
        </svg>
      </div>
      <div class="splash-title">Monochrome Music</div>
      <div class="splash-subtitle">Loading streaming client…</div>
      <div class="progress-track">
        <div class="progress-bar"></div>
      </div>
    </div>

    <!-- Error overlay -->
    <div id="error-overlay">
      <div class="error-icon">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
      </div>
      <div class="error-title">Unable to reach Monochrome</div>
      <div class="error-desc">
        The site may be temporarily unavailable or your network connection may be
        down.
      </div>
      <button class="retry-btn" onclick="loadApp()">Retry</button>
      <a
        class="open-external"
        href="https://monochrome.samidy.com/"
        target="_blank"
        rel="noopener"
        >Open in browser ↗</a
      >
    </div>

    <!-- The wrapped app -->
    <iframe
      id="app-frame"
      sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-modals allow-popups-to-escape-sandbox"
      allow="autoplay; fullscreen; clipboard-write; encrypted-media"
    ></iframe>

    <script>
      const TARGET_URL = "https://monochrome.samidy.com/";
      const LOAD_TIMEOUT_MS = 15000;

      function loadApp() {
        const splash = document.getElementById("splash");
        const frame = document.getElementById("app-frame");
        const errorOverlay = document.getElementById("error-overlay");

        // Reset state
        splash.classList.remove("hidden");
        errorOverlay.classList.remove("visible");
        frame.classList.remove("loaded");
        frame.src = "";

        // Reset progress animation
        const bar = splash.querySelector(".progress-bar");
        bar.style.animation = "none";
        void bar.offsetHeight; // trigger reflow
        bar.style.animation = "load 2.5s ease-in-out forwards";

        // Set src
        frame.src = TARGET_URL;

        let loaded = false;

        const timeout = setTimeout(() => {
          if (!loaded) {
            loaded = true;
            // Don't show error on timeout — the iframe might still work
            // Just reveal it anyway
            splash.classList.add("hidden");
            frame.classList.add("loaded");
          }
        }, LOAD_TIMEOUT_MS);

        frame.onload = () => {
          if (loaded) return;
          loaded = true;
          clearTimeout(timeout);
          // Small delay to let content render
          setTimeout(() => {
            splash.classList.add("hidden");
            frame.classList.add("loaded");
          }, 400);
        };

        frame.onerror = () => {
          if (loaded) return;
          loaded = true;
          clearTimeout(timeout);
          splash.classList.add("hidden");
          errorOverlay.classList.add("visible");
        };
      }

      // Initial load
      loadApp();
    </script>
  </body>
</html>
