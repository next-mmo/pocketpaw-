<section
    x-show="view === 'extensions'"
    x-cloak
    class="flex-1 min-h-0 pt-20 md:pt-24 px-4 md:px-8 pb-6"
    data-extension-host="true"
>
  <div class="grid grid-cols-1 xl:grid-cols-[320px,1fr] gap-4 h-full">
    <aside class="glass-dark p-4 flex flex-col min-h-0">
      <div class="flex items-start justify-between gap-3 mb-4">
        <div>
          <p class="text-[11px] uppercase tracking-[0.2em] text-white/35">Extensions</p>
          <h2 class="text-lg font-semibold text-white mt-1">Installed Apps</h2>
        </div>
        <button
            class="px-3 py-1.5 rounded-full text-xs bg-white/8 hover:bg-white/12 border border-white/10 text-white/80 transition-colors"
            @click="reloadExtensions()"
            :disabled="extensionsHost.reloading"
        >
          <span x-show="!extensionsHost.reloading">Reload</span>
          <span x-show="extensionsHost.reloading">Reloading...</span>
        </button>
      </div>

      <template x-if="extensionsHost.errors.length > 0">
        <div class="mb-4 rounded-2xl border border-amber-500/20 bg-amber-500/10 px-3 py-2 space-y-2">
          <p class="text-xs font-medium text-amber-300">Skipped invalid extensions</p>
          <template x-for="error in extensionsHost.errors" :key="error.source + error.message">
            <div class="text-[11px] text-amber-100/80 leading-relaxed">
              <span class="font-medium" x-text="error.source"></span>
              <span class="text-amber-100/60">:</span>
              <span x-text="error.message"></span>
            </div>
          </template>
        </div>
      </template>

      <div class="flex-1 min-h-0 overflow-y-auto space-y-2 pr-1">
        <template x-if="extensionsHost.loading">
          <div class="h-full flex items-center justify-center text-white/40 text-sm">
            Loading extensions...
          </div>
        </template>

        <template x-if="!extensionsHost.loading && extensionsHost.items.length === 0">
          <div class="rounded-2xl border border-dashed border-white/10 bg-white/[0.02] px-4 py-8 text-center text-sm text-white/40">
            No extensions discovered in the built-in bundle or <code class="text-white/55">~/.pocketpaw/extensions</code>.
          </div>
        </template>

        <template x-for="extension in extensionsHost.items" :key="extension.id">
          <button
              class="w-full text-left rounded-2xl border px-3 py-3 transition-all"
              :class="extensionsHost.activeId === extension.id
                  ? 'border-accent/50 bg-accent/12 shadow-[0_0_0_1px_rgba(10,132,255,0.15)]'
                  : 'border-white/10 bg-white/[0.03] hover:bg-white/[0.05]'"
              @click="navigateToExtension(extension)"
          >
            <div class="flex items-start justify-between gap-3">
              <div class="min-w-0">
                <div class="flex items-center gap-2">
                  <i :data-lucide="extension.icon || 'app-window'" class="w-4 h-4 text-accent"></i>
                  <span class="font-medium text-white truncate" x-text="extension.name"></span>
                </div>
                <p class="mt-1 text-xs text-white/55 leading-relaxed" x-text="extension.description || 'No description provided.'"></p>
                <div class="mt-2 flex items-center gap-2 text-[10px] uppercase tracking-[0.14em] text-white/35">
                  <span x-text="extension.source"></span>
                  <span>&bull;</span>
                  <span x-text="extension.version"></span>
                  <span>&bull;</span>
                  <span x-text="extension.scopes.length + ' scopes'"></span>
                </div>
              </div>

              <div class="shrink-0 flex flex-col items-end gap-2">
                <span
                    class="px-2 py-1 rounded-full text-[10px] uppercase tracking-[0.14em]"
                    :class="extension.enabled ? 'bg-emerald-500/15 text-emerald-300' : 'bg-white/10 text-white/45'"
                    x-text="extension.enabled ? 'Enabled' : 'Disabled'"
                ></span>
                <button
                    class="px-2 py-1 rounded-full text-[10px] border border-white/10 text-white/65 hover:text-white hover:bg-white/8 transition-colors"
                    @click="setExtensionEnabled(extension, !extension.enabled, $event)"
                    x-text="extension.enabled ? 'Disable' : 'Enable'"
                ></button>
              </div>
            </div>
          </button>
        </template>
      </div>
    </aside>

    <div class="glass-dark overflow-hidden min-h-0 flex flex-col">
      <template x-if="getActiveExtension()">
        <div class="h-full flex flex-col min-h-0">
          <div class="flex items-center justify-between gap-3 px-4 py-3 border-b border-white/8">
            <div>
              <div class="text-sm font-medium text-white" x-text="getActiveExtension().name"></div>
              <div class="text-xs text-white/40" x-text="'/#/apps/' + getActiveExtension().route"></div>
            </div>
            <button
                class="px-3 py-1.5 rounded-full text-xs bg-white/8 hover:bg-white/12 border border-white/10 text-white/80 transition-colors"
                @click="postExtensionContext(true)"
            >
              Refresh Token
            </button>
          </div>

          <template x-if="getActiveExtension().enabled">
            <iframe
                x-ref="extensionFrame"
                title="PocketPaw Extension"
                class="w-full flex-1 bg-black/20"
                sandbox="allow-downloads allow-forms allow-same-origin allow-scripts"
                :src="extensionsHost.frameSrc"
            ></iframe>
          </template>

          <template x-if="!getActiveExtension().enabled">
            <div class="flex-1 flex items-center justify-center text-center px-6 text-white/45 text-sm">
              Enable this extension to mount its assets and open the sandboxed app.
            </div>
          </template>
        </div>
      </template>

      <template x-if="!getActiveExtension()">
        <div class="h-full flex items-center justify-center text-center px-6">
          <div>
            <div class="text-lg font-medium text-white/80">Pick an extension</div>
            <p class="mt-2 text-sm text-white/40">Each app runs in its own iframe and only gets the scopes declared in its manifest.</p>
          </div>
        </div>
      </template>
    </div>
  </div>
</section>
