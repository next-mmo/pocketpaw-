<!--
  PocketPaw - Extensions View (Browser-Tab Architecture)

  A browser-like tabbed interface for extensions/apps:
  - Tab bar at the top with closable tabs and a "+" (home/launcher) button
  - Dial-pad launcher grid when no tab is active
  - Iframe content area per open tab
-->
<section
  x-show="view === 'extensions'"
  x-cloak
  class="flex-1 min-h-0 pt-10 md:pt-14 px-4 md:px-8 pb-6"
  data-extension-host="true"
  x-init="$watch('view', v => { if (v === 'extensions') { loadExtensions(); } })"
>
  <div class="flex flex-col h-full glass-dark overflow-hidden">
    <!-- ═══ Browser Tab Bar ═══ -->
    <div
      class="apps-tab-bar flex items-end gap-0 px-2 pt-2 border-b border-white/8 bg-black/20 min-h-[42px] overflow-x-auto"
      style="scrollbar-width: none"
    >
      <!-- Home / Launcher tab -->
      <button
        class="apps-tab flex items-center gap-1.5 px-3 py-2 text-[12px] font-medium rounded-t-lg transition-all shrink-0 border border-transparent border-b-0 mr-0.5"
        :class="isLauncherActive()
              ? 'bg-white/8 text-white border-white/10'
              : 'text-white/45 hover:text-white/70 hover:bg-white/[0.03]'"
        @click="switchToLauncher()"
      >
        <i data-lucide="layout-grid" class="w-3.5 h-3.5"></i>
        <span>Apps</span>
      </button>

      <!-- Open extension tabs -->
      <template x-for="tab in extensionsHost.openTabs" :key="tab.id">
        <div
          class="apps-tab group flex items-center gap-1.5 pl-3 pr-1.5 py-2 text-[12px] font-medium rounded-t-lg transition-all shrink-0 border border-transparent border-b-0 mr-0.5 max-w-[180px] cursor-pointer"
          :class="extensionsHost.activeTabId === tab.id
                ? 'bg-white/8 text-white border-white/10'
                : 'text-white/45 hover:text-white/70 hover:bg-white/[0.03]'"
          @click="switchAppTab(tab.id)"
        >
          <i
            :data-lucide="tab.icon || 'app-window'"
            class="w-3.5 h-3.5 shrink-0 text-accent"
          ></i>
          <span class="truncate" x-text="tab.name"></span>
          <!-- Close button -->
          <button
            class="ml-1 p-0.5 rounded-md opacity-0 group-hover:opacity-100 hover:bg-white/15 transition-all shrink-0"
            :class="extensionsHost.activeTabId === tab.id ? 'opacity-60' : ''"
            @click="closeAppTab(tab.id, $event)"
            title="Close tab"
          >
            <i data-lucide="x" class="w-3 h-3"></i>
          </button>
        </div>
      </template>

      <!-- Reload button (right-aligned) -->
      <div class="ml-auto flex items-center gap-1 py-1.5 shrink-0 pl-2">
        <button
          class="p-1.5 rounded-md text-white/30 hover:text-white/60 hover:bg-white/5 transition-colors"
          @click="reloadExtensions()"
          :disabled="extensionsHost.reloading"
          title="Reload extensions"
        >
          <i
            :data-lucide="extensionsHost.reloading ? 'loader-2' : 'refresh-cw'"
            class="w-3.5 h-3.5"
            :class="extensionsHost.reloading ? 'animate-spin' : ''"
          ></i>
        </button>
      </div>
    </div>

    <!-- ═══ Content Area ═══ -->
    <div class="flex-1 min-h-0 relative">
      <!-- ── Dial-Pad Launcher (shown when no tab active) ── -->
      <div
        x-show="isLauncherActive()"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 scale-95"
        x-transition:enter-end="opacity-100 scale-100"
        class="h-full overflow-y-auto p-6"
      >
        <!-- Hidden file input for ZIP upload -->
        <input
          type="file"
          id="extensionUploadInput"
          accept=".zip"
          class="hidden"
          @change="uploadExtension($event)"
        />
        <!-- Hidden folder input for folder upload -->
        <input
          type="file"
          id="extensionFolderInput"
          webkitdirectory
          class="hidden"
          @change="uploadExtensionFolder($event)"
        />

        <!-- Loading state -->
        <template x-if="extensionsHost.loading">
          <div
            class="h-full flex items-center justify-center text-white/40 text-sm"
          >
            <i data-lucide="loader-2" class="w-5 h-5 animate-spin mr-2"></i>
            Loading extensions...
          </div>
        </template>

        <!-- Upload progress overlay -->
        <template x-if="extensionsHost.uploadingExtension">
          <div
            class="mb-6 rounded-2xl border border-accent/20 bg-accent/10 px-4 py-3 flex items-center gap-3"
          >
            <i
              data-lucide="loader-2"
              class="w-4 h-4 animate-spin text-accent"
            ></i>
            <span class="text-sm text-accent">Installing extension...</span>
          </div>
        </template>

        <!-- Errors banner -->
        <template x-if="extensionsHost.errors.length > 0">
          <div
            class="mb-6 rounded-2xl border border-amber-500/20 bg-amber-500/10 px-4 py-3 space-y-1"
          >
            <p class="text-xs font-medium text-amber-300">
              Skipped invalid extensions
            </p>
            <template
              x-for="error in extensionsHost.errors"
              :key="error.source + error.message"
            >
              <div class="text-[11px] text-amber-100/80 leading-relaxed">
                <span class="font-medium" x-text="error.source"></span>
                <span class="text-amber-100/60">:</span>
                <span x-text="error.message"></span>
              </div>
            </template>
          </div>
        </template>

        <!-- Empty state -->
        <template
          x-if="!extensionsHost.loading && extensionsHost.items.length === 0"
        >
          <div
            class="h-full flex flex-col items-center justify-center gap-4 text-center"
          >
            <div
              class="w-16 h-16 rounded-2xl flex items-center justify-center"
              style="
                background: var(--surface-hover);
                border: 1px solid var(--glass-border);
              "
            >
              <i
                data-lucide="puzzle"
                class="w-8 h-8"
                style="color: var(--text-tertiary)"
              ></i>
            </div>
            <div>
              <div
                class="text-lg font-medium"
                style="color: var(--text-primary)"
              >
                No Extensions Installed
              </div>
              <p
                class="mt-1.5 text-sm max-w-sm"
                style="color: var(--text-secondary)"
              >
                Upload a
                <code
                  class="px-1.5 py-0.5 rounded"
                  style="
                    background: var(--surface-code);
                    color: var(--text-primary);
                  "
                  >.zip</code
                >
                extension, install from a local folder, or place folders in
                <code
                  class="px-1.5 py-0.5 rounded"
                  style="
                    background: var(--surface-code);
                    color: var(--text-primary);
                  "
                  >~/.pocketpaw/extensions</code
                >
                and click Reload.
              </p>
              <div class="flex items-center gap-3 mt-4">
                <a
                  href="/api/v1/extensions/download-sample/counter"
                  download="counter-sample.zip"
                  class="inline-flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium transition-colors no-underline"
                  style="
                    background: rgba(48, 209, 88, 0.1);
                    color: var(--success-color);
                  "
                >
                  <i data-lucide="download" class="w-4 h-4"></i>
                  Download Sample
                </a>
                <button
                  class="inline-flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium transition-colors"
                  style="
                    background: color-mix(
                      in srgb,
                      var(--accent-color) 12%,
                      transparent
                    );
                    color: var(--accent-color);
                  "
                  @click="triggerExtensionUpload()"
                >
                  <i data-lucide="upload" class="w-4 h-4"></i>
                  Upload .zip
                </button>
                <button
                  class="inline-flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium transition-colors"
                  style="
                    background: var(--surface-hover);
                    color: var(--text-secondary);
                  "
                  @click="triggerFolderUpload()"
                >
                  <i data-lucide="folder-open" class="w-4 h-4"></i>
                  Install Folder
                </button>
              </div>
            </div>
          </div>
        </template>

        <!-- App grid -->
        <template
          x-if="!extensionsHost.loading && extensionsHost.items.length > 0"
        >
          <div>
            <!-- Enabled apps section -->
            <template x-if="getEnabledExtensions().length > 0">
              <div class="mb-8">
                <div class="flex items-center justify-between mb-4 px-1">
                  <p
                    class="text-[11px] uppercase tracking-[0.18em] font-semibold"
                    style="color: var(--text-tertiary)"
                  >
                    Installed Apps
                  </p>
                  <div class="flex items-center gap-1.5">
                    <button
                      class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-medium transition-colors"
                      style="
                        background: color-mix(
                          in srgb,
                          var(--accent-color) 10%,
                          transparent
                        );
                        color: var(--accent-color);
                      "
                      @click="triggerExtensionUpload()"
                      :disabled="extensionsHost.uploadingExtension"
                    >
                      <i data-lucide="upload" class="w-3 h-3"></i>
                      Upload .zip
                    </button>
                    <button
                      class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-medium transition-colors"
                      style="
                        background: var(--surface-hover);
                        color: var(--text-secondary);
                      "
                      @click="triggerFolderUpload()"
                      :disabled="extensionsHost.uploadingExtension"
                    >
                      <i data-lucide="folder-open" class="w-3 h-3"></i>
                      Install Folder
                    </button>
                  </div>
                </div>
                <div
                  class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3"
                >
                  <template x-for="ext in getEnabledExtensions()" :key="ext.id">
                    <div
                      class="group relative flex flex-col items-center gap-2.5 p-4 rounded-2xl cursor-pointer transition-all hover:opacity-80 active:scale-[0.97]"
                      style="
                        border: 1px solid var(--glass-border);
                        background: var(--surface-hover);
                      "
                      @click="openAppTab(ext)"
                    >
                      <!-- Source badge -->
                      <span
                        class="absolute top-2 left-2 text-[9px] font-semibold uppercase tracking-wider px-1.5 py-0.5 rounded-md"
                        :style="ext.source === 'builtin'
                          ? 'background: var(--surface-hover); color: var(--text-tertiary);'
                          : 'background: rgba(48, 209, 88, 0.12); color: var(--success-color);'"
                        x-text="ext.source === 'builtin' ? 'Built-in' : 'Uploaded'"
                      ></span>

                      <!-- Icon -->
                      <div
                        class="w-12 h-12 rounded-xl flex items-center justify-center mt-3"
                        style="
                          background: var(--surface-hover);
                          border: 1px solid var(--glass-border);
                        "
                      >
                        <i
                          :data-lucide="ext.icon || 'app-window'"
                          class="w-6 h-6"
                          style="color: var(--text-tertiary)"
                        ></i>
                      </div>

                      <!-- Name & action links -->
                      <div class="text-center min-w-0 w-full">
                        <div
                          class="text-[13px] font-medium truncate"
                          style="color: var(--text-secondary)"
                          x-text="ext.name || ext.id"
                        ></div>
                        <div class="mt-1.5 text-center text-[10px]">
                          <button
                            class="transition-colors"
                            style="color: var(--accent-color)"
                            @click="setExtensionEnabled(ext, false, $event)"
                          >
                            Disable</button
                          ><template x-if="ext.is_removable"
                            ><span
                              ><span style="color: var(--text-tertiary)">
                                · </span
                              ><button
                                class="transition-colors hover:underline"
                                style="color: var(--danger-color)"
                                @click="deleteExtension(ext, $event)"
                              >
                                Uninstall
                              </button></span
                            ></template
                          >
                        </div>
                      </div>

                      <!-- Open indicator dot -->
                      <div
                        x-show="extensionsHost.openTabs.some(t => t.id === ext.id)"
                        class="w-1.5 h-1.5 rounded-full absolute bottom-2 right-2"
                        style="background: var(--accent-color)"
                      ></div>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <!-- Disabled apps section -->
            <template x-if="getDisabledExtensions().length > 0">
              <div>
                <p
                  class="text-[11px] uppercase tracking-[0.18em] font-semibold mb-4 px-1"
                  style="color: var(--text-tertiary)"
                >
                  Disabled
                </p>
                <div
                  class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3"
                >
                  <template
                    x-for="ext in getDisabledExtensions()"
                    :key="ext.id"
                  >
                    <div
                      class="group relative flex flex-col items-center gap-2.5 p-4 rounded-2xl opacity-55"
                      style="
                        border: 1px dashed var(--glass-border);
                        background: var(--surface-hover);
                      "
                    >
                      <!-- Source badge -->
                      <span
                        class="absolute top-2 left-2 text-[9px] font-semibold uppercase tracking-wider px-1.5 py-0.5 rounded-md"
                        style="
                          background: var(--surface-hover);
                          color: var(--text-tertiary);
                        "
                        x-text="ext.source === 'builtin' ? 'Built-in' : 'Uploaded'"
                      ></span>

                      <!-- Icon -->
                      <div
                        class="w-12 h-12 rounded-xl flex items-center justify-center mt-3"
                        style="
                          background: var(--surface-hover);
                          border: 1px solid var(--glass-border);
                        "
                      >
                        <i
                          :data-lucide="ext.icon || 'app-window'"
                          class="w-6 h-6"
                          style="color: var(--text-tertiary)"
                        ></i>
                      </div>

                      <!-- Name & action links -->
                      <div class="text-center min-w-0 w-full">
                        <div
                          class="text-[13px] font-medium truncate"
                          style="color: var(--text-secondary)"
                          x-text="ext.name || ext.id"
                        ></div>
                        <div class="mt-1.5 text-center text-[10px]">
                          <button
                            class="transition-colors"
                            style="color: var(--accent-color)"
                            @click="setExtensionEnabled(ext, true, $event)"
                          >
                            Enable</button
                          ><template x-if="ext.is_removable"
                            ><span
                              ><span style="color: var(--text-tertiary)">
                                · </span
                              ><button
                                class="transition-colors hover:underline"
                                style="color: var(--danger-color)"
                                @click="deleteExtension(ext, $event)"
                              >
                                Uninstall
                              </button></span
                            ></template
                          >
                        </div>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <!-- Developer section -->
            <div
              class="mt-8 pt-6"
              style="border-top: 1px solid var(--glass-border)"
            >
              <div class="flex items-center justify-between mb-3 px-1">
                <p
                  class="text-[11px] uppercase tracking-[0.18em] font-semibold"
                  style="color: var(--text-tertiary)"
                >
                  Build Your Own
                </p>
              </div>
              <div
                class="rounded-2xl p-5"
                style="
                  border: 1px dashed var(--glass-border);
                  background: var(--surface-hover);
                "
              >
                <div
                  class="flex flex-col sm:flex-row items-start sm:items-center gap-4"
                >
                  <div class="flex-1 min-w-0">
                    <p
                      class="text-[13px] font-medium"
                      style="color: var(--text-primary)"
                    >
                      Create your own extension
                    </p>
                    <p
                      class="text-[11px] mt-1 leading-relaxed"
                      style="color: var(--text-tertiary)"
                    >
                      Download the sample Counter app as a starter template.
                      Edit the code and upload it back here — as a .zip or
                      directly from a folder.
                    </p>
                  </div>
                  <div class="flex items-center gap-2 shrink-0">
                    <a
                      href="/api/v1/extensions/download-sample/counter"
                      download="counter-sample.zip"
                      class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-medium transition-colors no-underline"
                      style="
                        background: rgba(48, 209, 88, 0.1);
                        color: var(--success-color);
                      "
                    >
                      <i data-lucide="download" class="w-3 h-3"></i>
                      Download Sample
                    </a>
                    <button
                      class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-medium transition-colors"
                      style="
                        background: color-mix(
                          in srgb,
                          var(--accent-color) 10%,
                          transparent
                        );
                        color: var(--accent-color);
                      "
                      @click="triggerExtensionUpload()"
                      :disabled="extensionsHost.uploadingExtension"
                    >
                      <i data-lucide="upload" class="w-3 h-3"></i>
                      Upload .zip
                    </button>
                    <button
                      class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[11px] font-medium transition-colors"
                      style="
                        background: var(--surface-hover);
                        color: var(--text-secondary);
                      "
                      @click="triggerFolderUpload()"
                      :disabled="extensionsHost.uploadingExtension"
                    >
                      <i data-lucide="folder-open" class="w-3 h-3"></i>
                      Install Folder
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <!-- Info footer -->
            <div class="mt-4 text-center">
              <p class="text-[11px] text-white/20">
                <span x-text="extensionsHost.items.length"></span>
                extension<span x-show="extensionsHost.items.length !== 1"
                  >s</span
                >
                discovered &bull; Each app runs in its own sandboxed iframe
              </p>
            </div>
          </div>
        </template>
      </div>

      <!-- ── Extension iframe area (one per open tab, only active visible) ── -->
      <template x-for="tab in extensionsHost.openTabs" :key="tab.id">
        <div
          class="absolute inset-0 flex flex-col"
          x-show="extensionsHost.activeTabId === tab.id"
        >
          <!-- Address bar / Info strip -->
          <div
            class="flex items-center gap-3 px-4 py-2 border-b border-white/5 bg-black/10 shrink-0"
          >
            <div class="flex items-center gap-2 flex-1 min-w-0">
              <div
                class="flex items-center gap-1.5 px-2.5 py-1 rounded-md bg-white/5 text-[11px] text-white/40 font-mono flex-1 min-w-0 truncate"
              >
                <i
                  data-lucide="globe"
                  class="w-3 h-3 shrink-0 text-white/25"
                ></i>
                <span class="truncate" x-text="'#/apps/' + tab.route"></span>
              </div>
            </div>
            <div class="flex items-center gap-1 shrink-0">
              <button
                class="p-1.5 rounded-md text-white/30 hover:text-white/60 hover:bg-white/5 transition-colors"
                @click="postExtensionContext(true)"
                title="Refresh token"
              >
                <i data-lucide="rotate-cw" class="w-3.5 h-3.5"></i>
              </button>
              <button
                class="p-1.5 rounded-md text-white/30 hover:text-white/60 hover:bg-white/5 transition-colors"
                @click="setExtensionEnabled(extensionsHost.items.find(i => i.id === tab.id), false, $event)"
                title="Disable extension"
              >
                <i data-lucide="power" class="w-3.5 h-3.5"></i>
              </button>
            </div>
          </div>

          <!-- ═══ Plugin Install/Start Screen ═══ -->
          <template x-if="tab.isPlugin && activeTabNeedsInstall() && extensionsHost.activeTabId === tab.id">
            <div class="flex-1 flex items-center justify-center p-8 overflow-y-auto"
                 x-data="{ showLogs: false }">
              <div class="w-full max-w-lg">
                <!-- Plugin Icon & Name -->
                <div class="text-center mb-6">
                  <div class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4"
                       style="background: var(--surface-hover); border: 1px solid var(--glass-border);">
                    <i :data-lucide="tab.icon || 'app-window'" class="w-8 h-8"
                       style="color: var(--accent-color)"></i>
                  </div>
                  <h2 class="text-xl font-semibold" style="color: var(--text-primary)"
                      x-text="tab.name"></h2>
                  <p class="text-sm mt-1.5" style="color: var(--text-tertiary)"
                     x-text="(activePluginExt()?.description || 'Plugin extension')"></p>
                </div>

                <!-- State: Idle (not installed) -->
                <template x-if="activePluginState()?.status === 'idle'">
                  <div class="text-center">
                    <p class="text-[13px] mb-4" style="color: var(--text-secondary)">
                      This app needs to be installed before first use. This will set up its environment, dependencies, and build assets.
                    </p>
                    <button
                      class="inline-flex items-center gap-2 px-6 py-3 rounded-xl text-sm font-semibold transition-all hover:brightness-110 active:scale-[0.97]"
                      style="background: var(--accent-color); color: white;"
                      @click="installPlugin(tab.id)"
                    >
                      <i data-lucide="download" class="w-4 h-4"></i>
                      Install
                    </button>
                  </div>
                </template>

                <!-- State: Installing -->
                <template x-if="activePluginState()?.status === 'installing'">
                  <div>
                    <div class="flex items-center gap-3 mb-3">
                      <i data-lucide="loader-2" class="w-5 h-5 animate-spin" style="color: var(--accent-color)"></i>
                      <span class="text-sm font-medium" style="color: var(--text-primary)">Installing...</span>
                      <span class="text-[11px] ml-auto tabular-nums" style="color: var(--text-tertiary)"
                            x-text="Math.round((activePluginState()?.progress || 0) * 100) + '%'"></span>
                    </div>
                    <!-- Progress bar -->
                    <div class="w-full h-2 rounded-full overflow-hidden mb-4"
                         style="background: var(--surface-hover);">
                      <div class="h-full rounded-full transition-all duration-500"
                           style="background: var(--accent-color);"
                           :style="'width: ' + Math.max(2, (activePluginState()?.progress || 0) * 100) + '%'"></div>
                    </div>
                    <!-- Toggle logs -->
                    <button
                      class="text-[11px] flex items-center gap-1 mx-auto transition-colors"
                      style="color: var(--text-tertiary)"
                      @click="showLogs = !showLogs"
                    >
                      <i :data-lucide="showLogs ? 'chevron-up' : 'chevron-down'" class="w-3 h-3"></i>
                      <span x-text="showLogs ? 'Hide logs' : 'Show logs'"></span>
                    </button>
                    <!-- Log output -->
                    <div x-show="showLogs" x-transition
                         class="mt-3 rounded-xl p-3 max-h-[200px] overflow-y-auto font-mono text-[11px] leading-relaxed"
                         style="background: black; color: var(--text-tertiary); border: 1px solid var(--glass-border);">
                      <template x-for="(line, i) in (activePluginState()?.logs || []).slice(-30)" :key="i">
                        <div x-text="line" class="whitespace-pre-wrap break-all"></div>
                      </template>
                      <div x-show="!activePluginState()?.logs?.length" class="text-white/20">Waiting for output...</div>
                    </div>
                  </div>
                </template>

                <!-- State: Installed (ready to start daemon) -->
                <template x-if="activePluginState()?.status === 'installed'">
                  <div class="text-center">
                    <div class="inline-flex items-center gap-2 px-4 py-2 rounded-xl mb-4 text-sm"
                         style="background: rgba(48, 209, 88, 0.1); color: var(--success-color);">
                      <i data-lucide="check-circle-2" class="w-4 h-4"></i>
                      Installation complete
                    </div>
                    <p class="text-[13px] mb-4" style="color: var(--text-secondary)">
                      Start the backend service to begin using this app.
                    </p>
                    <div class="flex items-center justify-center gap-3">
                      <button
                        class="inline-flex items-center gap-2 px-6 py-3 rounded-xl text-sm font-semibold transition-all hover:brightness-110 active:scale-[0.97]"
                        style="background: var(--accent-color); color: white;"
                        @click="startPlugin(tab.id)"
                      >
                        <i data-lucide="play" class="w-4 h-4"></i>
                        Start
                      </button>
                      <button
                        class="inline-flex items-center gap-2 px-4 py-3 rounded-xl text-sm font-medium transition-all hover:brightness-110"
                        style="background: var(--surface-hover); color: var(--text-secondary);"
                        @click="reinstallPlugin(tab.id)"
                        title="Clean and re-install (keeps venv)"
                      >
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                        Reinstall
                      </button>
                      <button
                        class="inline-flex items-center gap-2 px-4 py-3 rounded-xl text-sm font-medium transition-all hover:brightness-110"
                        style="background: rgba(255, 69, 58, 0.08); color: var(--danger-color);"
                        @click="uninstallPlugin(tab.id)"
                        title="Delete environment, source, and built assets"
                      >
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                        Uninstall
                      </button>
                    </div>
                  </div>
                </template>

                <!-- State: Starting -->
                <template x-if="activePluginState()?.status === 'starting'">
                  <div class="text-center">
                    <div class="flex items-center justify-center gap-3 mb-3">
                      <i data-lucide="loader-2" class="w-5 h-5 animate-spin" style="color: var(--accent-color)"></i>
                      <span class="text-sm font-medium" style="color: var(--text-primary)">Starting service...</span>
                    </div>
                    <p class="text-[12px]" style="color: var(--text-tertiary)">
                      Waiting for the backend to be ready
                    </p>
                  </div>
                </template>

                <!-- State: Stopped (was running, now stopped) -->
                <template x-if="activePluginState()?.status === 'stopped'">
                  <div class="text-center">
                    <div class="inline-flex items-center gap-2 px-4 py-2 rounded-xl mb-4 text-sm"
                         style="background: var(--surface-hover); color: var(--text-secondary);">
                      <i data-lucide="circle-stop" class="w-4 h-4"></i>
                      Service stopped
                    </div>
                    <p class="text-[13px] mb-4" style="color: var(--text-secondary)">
                      Restart the backend service to continue using this app.
                    </p>
                    <div class="flex items-center justify-center gap-3">
                      <button
                        class="inline-flex items-center gap-2 px-6 py-3 rounded-xl text-sm font-semibold transition-all hover:brightness-110 active:scale-[0.97]"
                        style="background: var(--accent-color); color: white;"
                        @click="startPlugin(tab.id)"
                      >
                        <i data-lucide="play" class="w-4 h-4"></i>
                        Restart
                      </button>
                      <button
                        class="inline-flex items-center gap-2 px-4 py-3 rounded-xl text-sm font-medium transition-all hover:brightness-110"
                        style="background: var(--surface-hover); color: var(--text-secondary);"
                        @click="reinstallPlugin(tab.id)"
                        title="Clean and re-install (keeps venv)"
                      >
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                        Reinstall
                      </button>
                      <button
                        class="inline-flex items-center gap-2 px-4 py-3 rounded-xl text-sm font-medium transition-all hover:brightness-110"
                        style="background: rgba(255, 69, 58, 0.08); color: var(--danger-color);"
                        @click="uninstallPlugin(tab.id)"
                        title="Delete environment, source, and built assets"
                      >
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                        Uninstall
                      </button>
                    </div>
                  </div>
                </template>

                <!-- State: Uninstalling -->
                <template x-if="activePluginState()?.status === 'uninstalling'">
                  <div class="text-center">
                    <div class="flex items-center justify-center gap-3 mb-3">
                      <i data-lucide="loader-2" class="w-5 h-5 animate-spin" style="color: var(--danger-color)"></i>
                      <span class="text-sm font-medium" style="color: var(--text-primary)">Uninstalling...</span>
                    </div>
                    <p class="text-[12px]" style="color: var(--text-tertiary)">
                      Stopping daemon, removing environment and built assets
                    </p>
                  </div>
                </template>

                <!-- State: Error -->
                <template x-if="activePluginState()?.status === 'error'">
                  <div class="text-center">
                    <div class="inline-flex items-center gap-2 px-4 py-2 rounded-xl mb-3 text-sm"
                         style="background: rgba(255, 69, 58, 0.1); color: var(--danger-color);">
                      <i data-lucide="alert-triangle" class="w-4 h-4"></i>
                      Installation failed
                    </div>
                    <p class="text-[12px] mb-4 px-4 rounded-lg py-2 text-left font-mono break-all"
                       style="background: rgba(255,69,58,0.05); color: var(--danger-color); border: 1px solid rgba(255,69,58,0.15);"
                       x-text="activePluginState()?.error || 'Unknown error'"></p>
                    <div class="flex items-center justify-center gap-3">
                      <button
                        class="inline-flex items-center gap-2 px-6 py-3 rounded-xl text-sm font-semibold transition-all hover:brightness-110 active:scale-[0.97]"
                        style="background: var(--accent-color); color: white;"
                        @click="installPlugin(tab.id)"
                      >
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                        Retry Install
                      </button>
                      <button
                        class="inline-flex items-center gap-2 px-4 py-3 rounded-xl text-sm font-medium transition-all hover:brightness-110"
                        style="background: rgba(255, 69, 58, 0.08); color: var(--danger-color);"
                        @click="uninstallPlugin(tab.id)"
                        title="Delete environment and start over"
                      >
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                        Uninstall
                      </button>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <!-- Extension iframe (only shown when plugin is running or non-plugin) -->
          <iframe
            x-show="!tab.isPlugin || !activeTabNeedsInstall() || extensionsHost.activeTabId !== tab.id"
            :id="'extensionFrame_' + tab.id"
            title="PocketPaw Extension"
            class="w-full flex-1 bg-black/20"
            sandbox="allow-downloads allow-forms allow-same-origin allow-scripts"
            :src="extensionsHost.frameSrcs[tab.id] || ''"
          ></iframe>
        </div>
      </template>
    </div>
  </div>
</section>
