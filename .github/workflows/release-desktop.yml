name: Release PocketPaw Desktop (Windows)

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      skip_backend:
        description: 'Skip Nuitka backend build (faster, no Python binary bundled)'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Python + UV (for backend build) ──────────────────────
      - name: Set up Python
        if: ${{ github.event.inputs.skip_backend != 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        if: ${{ github.event.inputs.skip_backend != 'true' }}
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        if: ${{ github.event.inputs.skip_backend != 'true' }}
        run: uv sync --group build
        working-directory: .

      # ─── Node.js + pnpm ───────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Electron dependencies
        run: pnpm install
        working-directory: app-wrapper

      # ─── Build Backend (Nuitka) ───────────────────────────────
      - name: Build Python backend with Nuitka
        if: ${{ github.event.inputs.skip_backend != 'true' }}
        run: uv run python app-wrapper/scripts/build-backend.py
        working-directory: .

      # ─── Build Electron + Package ─────────────────────────────
      - name: Build Electron app
        run: pnpm build:electron
        working-directory: app-wrapper

      - name: Package Windows installer
        run: pnpm exec electron-builder --win --publish never
        working-directory: app-wrapper
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── Upload Artifact ──────────────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: PocketPaw-Windows-Setup
          path: app-wrapper/dist/PocketPaw-Setup-*.exe
          retention-days: 30

      # ─── Create GitHub Release (on tag push) ──────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app-wrapper/dist/PocketPaw-Setup-*.exe
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
